<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="{{pluginResources}}/Template/encore/namecard/list/namecard_list.css">
</head>
<body id="body">
    <div id="wrapper">
        <div class="card-grid">
            {{each list n}}
            <div class="namecard-card">
                <div class="card-portrait">
                    <img class="card-avatar" src="{{n.cardBg || n.avatar}}">
                    <span class="card-index">{{n.index}}</span>
                </div>
                <div class="card-name-bar">
                    <span class="card-name">{{n.name}}</span>
                </div>
            </div>
            {{/each}}
        </div>
        <div id="copyright">{{@copyright}}</div>
    </div>
</body>
</html>
